<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>P2P Chat Perbaikan</title>
    <style>
        body { font-family: sans-serif; padding: 20px; max-width: 500px; margin: auto; background: #f4f4f9; }
        #chat { height: 300px; border: 1px solid #ccc; overflow-y: scroll; background: #fff; padding: 10px; margin-bottom: 10px; border-radius: 8px; }
        textarea { width: 100%; height: 60px; margin-bottom: 10px; border-radius: 4px; border: 1px solid #ddd; }
        .controls { display: flex; flex-direction: column; gap: 10px; }
        button { cursor: pointer; padding: 10px; border: none; border-radius: 5px; background: #007bff; color: white; }
        .status { font-size: 0.8em; color: #666; margin-bottom: 5px; font-weight: bold; }
    </style>
</head>
<body>

    <h2>P2P Chat (Fixed)</h2>
    <div id="status" class="status">Status: Menunggu inisialisasi...</div>
    <div id="chat"></div>
    <textarea id="messageInput" placeholder="Ketik pesan..."></textarea>
    
    <div class="controls">
        <button onclick="createOffer()">1. Buat Undangan (Offer)</button>
        <button onclick="acceptAnswer()">2. Tempel Kode (Offer/Answer)</button>
        <button onclick="sendMessage()" style="background: #28a745;">3. Kirim Pesan</button>
    </div>

    <script>
        // --- DEKLARASI GLOBAL DI AWAL ---
        let peerConnection;
        let dataChannel;
        const config = { iceServers: [{ urls: 'stun:stun.l.google.com:1902' }] };

        // Fungsi inisialisasi PC (Peer Connection)
        function initPeerConnection() {
            peerConnection = new RTCPeerConnection(config);

            peerConnection.onicecandidate = (event) => {
                if (!event.candidate && peerConnection.localDescription) {
                    console.log("ICE Gathering Selesai");
                    const desc = JSON.stringify(peerConnection.localDescription);
                    prompt("SALIN KODE INI:", desc);
                }
            };

            peerConnection.ondatachannel = (event) => {
                dataChannel = event.channel;
                setupChannelEvents();
            };
        }

        function setupChannelEvents() {
            dataChannel.onopen = () => updateStatus("Terhubung secara P2P!");
            dataChannel.onmessage = (e) => appendChat("Teman: " + e.data);
            dataChannel.onclose = () => updateStatus("Koneksi terputus.");
        }

        // --- FUNGSI UTAMA ---
        async function createOffer() {
            initPeerConnection();
            dataChannel = peerConnection.createDataChannel("chat");
            setupChannelEvents();

            const offer = await peerConnection.createOffer();
            await peerConnection.setLocalDescription(offer);
            updateStatus("Mengumpulkan data... Mohon tunggu sebentar.");
        }

        async function acceptAnswer() {
            const input = prompt("Tempel kode dari teman di sini:");
            if (!input) return;
            
            const desc = JSON.parse(input);
            
            // Jika kita belum membuat PC (sebagai penerima), buat dulu
            if (!peerConnection) initPeerConnection();

            await peerConnection.setRemoteDescription(desc);

            if (desc.type === "offer") {
                const answer = await peerConnection.createAnswer();
                await peerConnection.setLocalDescription(answer);
                updateStatus("Mengumpulkan Answer... Mohon tunggu.");
            }
        }

        function sendMessage() {
            const msgInput = document.getElementById("messageInput");
            if (dataChannel && dataChannel.readyState === "open") {
                dataChannel.send(msgInput.value);
                appendChat("Saya: " + msgInput.value);
                msgInput.value = "";
            } else {
                alert("Koneksi belum tersambung!");
            }
        }

        // --- HELPER ---
        function appendChat(text) {
            const div = document.createElement("div");
            div.textContent = text;
            document.getElementById("chat").appendChild(div);
            document.getElementById("chat").scrollTop = document.getElementById("chat").scrollHeight;
        }

        function updateStatus(text) {
            document.getElementById("status").textContent = "Status: " + text;
        }

        // Inisialisasi awal
        updateStatus("Siap. Klik 'Buat Undangan' untuk memulai.");
    </script>
</body>
</html>
